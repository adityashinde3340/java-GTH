<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Form 🧑‍🎓</title>
    <style>
      table {
        box-shadow: 0 0 10px black;
        border-collapse: collapse;
        margin: auto;
        padding: 50px;
        width: 700px;
        background-color: white;
        border-radius: 30px;
      }
      td {
        padding: 10px;
        width: 100px;
      }
      td input[type="text"],
      input[type="email"],
      input[type="number"] {
        width: 500px;
        height: 25px;
      }
      h3 {
        text-align: center;
        color: white;
      }
      h3::before {
        content: "🧑‍🎓";
      }
      .container {
        /* background-color: #ffff; */
      }
      body {
        background-color: rgb(129, 132, 132);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h3>Student Form</h3>
      <table>
        <tr>
          <td><label for="FirstName">First Name</label></td>
          <td><input type="text" name="FirstName" id="FirstName" /></td>
        </tr>

        <tr>
          <td><label for="MiddleName">Middle Name</label></td>
          <td><input type="text" name="MiddleName" id="MiddleName" /></td>
        </tr>

        <tr>
          <td><label for="LastName">Last Name</label></td>
          <td><input type="text" name="LastName" id="LastName" /></td>
        </tr>

        <tr>
          <td><label for="email">Email</label></td>
          <td><input type="email" name="email" id="email" /></td>
        </tr>
        <tr>
          <td><label for="CollageName">Collage Name</label></td>
          <td><input type="text" name="CollageName" id="CollageName" /></td>
        </tr>

        <tr>
          <td><label for="gender">Gender</label></td>
          <td>
            <input type="radio" value="Male" name="Gender" id="gender" />Male
            <input
              type="radio"
              value="Female"
              name="Gender"
              id="gender"
            />Female
            <input
              type="radio"
              value="Others"
              name="Gender"
              id="gender"
            />Others
          </td>
        </tr>

        <tr>
          <td><label for="course">Course</label></td>
          <td>
            <select name="course" id="course">
              <option value="BCA">BCA</option>
              <option value="BE">BE</option>
              <option value="Bsc">Bsc</option>
              <option value="Btech">Btech</option>
              <option value="ME">ME</option>
              <option value="Msc">Msc</option>
              <option value="MCA">MCA</option>
              <option value="Mtech">Mtech</option>
            </select>
          </td>
        </tr>

        <tr>
          <td><label for="year">Year</label></td>
          <td><input type="text" id="year" /></td>
        </tr>

        <tr>
          <td><label for="address">Address</label></td>
          <td><textarea name="address" id="address" cols="66"></textarea></td>
        </tr>

        <tr>
          <td><label for="Mode">Mode</label></td>
          <td><input type="text" name="mode" id="Mode" /></td>
        </tr>

        <tr>
          <td><label for="mobile">Mobile Number</label></td>
          <td><input type="number" id="mobile" /></td>
        </tr>
      </table>
    </div>
  </body>
</html>
